<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CHINA2 · Legacy Reference Shell Redirect</title>
    <meta http-equiv="refresh" content="0; url=./index.contract.html" />
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d11;
        --panel: rgba(255,255,255,0.04);
        --line: rgba(255,255,255,0.1);
        --text: #f2efe8;
        --muted: #b9b2a4;
        --accent: #d2b07a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, rgba(210,176,122,0.12), transparent 26%), linear-gradient(180deg, #0d1014, #090b0e);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(720px, calc(100vw - 40px));
        padding: 28px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--panel);
        backdrop-filter: blur(14px);
      }
      p, h1 { margin: 0; }
      .kicker {
        font-size: 11px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--accent);
      }
      h1 {
        margin-top: 10px;
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1.02;
        letter-spacing: -0.03em;
      }
      .copy {
        margin-top: 18px;
        color: var(--muted);
        line-height: 1.85;
        font-size: 16px;
      }
      a {
        display: inline-flex;
        margin-top: 20px;
        padding: 12px 14px;
        border-radius: 999px;
        border: 1px solid var(--line);
        color: var(--text);
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="kicker">CHINA2 · legacy surface retired</p>
      <h1>旧 reference-shell 入口不再承担并列实现身份</h1>
      <p class="copy">
        当前唯一可信实现入口是 `web/reference-shell/index.contract.html`。
        本页面保留文件名只为兼容历史引用，不再作为独立主入口。
      </p>
      <a href="./index.contract.html">进入 canonical contract shell</a>
    </main>
    <script>
      window.location.replace('./index.contract.html');
    </script>
  </body>
</html>
